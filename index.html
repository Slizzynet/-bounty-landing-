<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bounty-landing</title>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>

<style>

body {
    background-color: #000;
    color: #ff2a2a;
    font-family: Consolas, monospace;
    margin: 0;
}

.container {
    width: 95%;
    max-width: 1300px;
    margin: auto;
}

h1 {
    text-align: center;
    font-size: 60px;
}

.description {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
}

.countdown {
    text-align: center;
    font-size: 36px;
    margin-bottom: 30px;
}

.board {
    border: 2px solid red;
    padding: 20px;
    margin-bottom: 20px;
}

.flex {
    display: flex;
    gap: 20px;
}

.flex > div {
    flex: 1;
}

input, textarea {
    width: 100%;
    background: black;
    border: 1px solid red;
    color: red;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    background: red;
    color: black;
    padding: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ff4444;
}

.hidden {
    display: none;
}

.logo {
    position: absolute;
    top: 20px;
    right: 20px;
}

#dashboard {
    display: none;
}

</style>

</head>
<body>

<div class="logo">
<svg width="120" height="120" viewBox="0 0 120 120">
<circle cx="60" cy="60" r="40" stroke="red" stroke-width="3" fill="none"/>
<path d="M20 60 H100" stroke="red" stroke-width="2"/>
<path d="M60 20 V100" stroke="red" stroke-width="2"/>
<line x1="10" y1="90" x2="100" y2="30" stroke="red" stroke-width="4"/>
<polygon points="100,30 90,35 95,45" fill="red"/>
<text x="80" y="55" fill="red" font-size="18">$$$</text>
</svg>
</div>

<div class="container">

<h1>MISSION BOARD</h1>

<div class="description">
Competitive missions that allow gaming communities to hold disruptive players accountable through verified gameplay challenges
</div>

<div class="countdown" id="countdown"></div>


<!-- AUTH SECTION -->
<div class="board" id="auth">
<h2>Login or Register</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>


<!-- DASHBOARD -->
<div id="dashboard">

<div class="flex">

<!-- CREATE BOUNTY -->
<div class="board">
<h2>Report Player & Add Bounty</h2>
<input id="target" placeholder="Player Tag">
<textarea id="reason" placeholder="Reason"></textarea>
<input id="amount" type="number" placeholder="Amount">

<div id="paypal-button-container"></div>

</div>


<!-- CLAIM BOUNTY -->
<div class="board">
<h2>Claim Bounty</h2>
<input id="claimTarget" placeholder="Player">
<input id="clip" placeholder="Clip Link">
<input id="paypalEmail" placeholder="Your PayPal Email">
<button onclick="submitClaim()">Submit Claim</button>
</div>

</div>


<!-- ACTIVE MISSIONS -->
<div class="board">
<h2>Active Missions</h2>
<div id="missions"></div>
</div>


</div>


</div>


<script>

// COUNTDOWN
let end = new Date();
end.setDate(end.getDate() + 7);

setInterval(() => {

let now = new Date();
let diff = end - now;

let d = Math.floor(diff / (1000*60*60*24));
let h = Math.floor(diff / (1000*60*60)) % 24;
let m = Math.floor(diff / (1000*60)) % 60;
let s = Math.floor(diff / 1000) % 60;

countdown.innerHTML = `${d}d ${h}h ${m}m ${s}s`;

}, 1000);


// REGISTER
async function register() {

await fetch('/api/register', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:username.value,
password:password.value
})
});

alert('Registered');

}


// LOGIN
async function login() {

let res = await fetch('/api/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:username.value,
password:password.value
})
});

let data = await res.json();

if(data.success) {

auth.style.display='none';
dashboard.style.display='block';
loadMissions();

}

}


// LOAD MISSIONS
async function loadMissions() {

let res = await fetch('/api/missions');
let missions = await res.json();

missionsDiv.innerHTML='';

missions.forEach(m=>{

missions.innerHTML += `

<div>
Player: ${m.target}<br>
Reward: $${m.amount}
</div>

`;

});

}


// CLAIM
async function submitClaim() {

await fetch('/api/claim',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
target:claimTarget.value,
clip:clip.value,
paypal:paypalEmail.value
})
});

alert('Claim submitted');

}


// PAYPAL BUTTON
paypal.Buttons({

createOrder: function(data, actions) {

return actions.order.create({
purchase_units: [{
amount: {
value: amount.value
}
}]
});

},

onApprove: async function(data, actions) {

let order = await actions.order.capture();

await fetch('/api/createMission',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
target:target.value,
reason:reason.value,
amount:amount.value,
paymentID:order.id
})
});

alert('Bounty created');
loadMissions();

}

}).render('#paypal-button-container');


</script>

</body>
</html>
