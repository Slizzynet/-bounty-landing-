<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MISSION BOARD</title>

<script src="https://www.paypal.com/sdk/js?client-id=AYJrkUdCunqmHyIzD0fL4vylFWemiJsOggQbZ00__2JgpZ0agkeISjKWL-5dgPTEFPet7DO2gH2aNlrF&currency=USD"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:#070707;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

/* HEADER */

header{
text-align:center;
padding:40px;
background:linear-gradient(180deg,#1a0000,#000);
border-bottom:1px solid #ff2a2a55;
}

header h1{
font-size:48px;
letter-spacing:4px;
color:#ff2a2a;
text-shadow:0 0 20px red;
}

.live-bar{
text-align:center;
padding:10px;
background:#111;
border-bottom:1px solid #ff2a2a33;
}

/* CONTAINER */

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:30px 0;
}

.panel{
background:#0e0e0e;
border:1px solid #ff2a2a33;
border-radius:12px;
padding:20px;
margin-bottom:25px;
}

.panel h2{
color:#ff3c3c;
margin-bottom:15px;
}

/* INPUTS */

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
background:#000;
border:1px solid #ff2a2a55;
border-radius:6px;
color:white;
}

button{
padding:10px 16px;
background:#ff2a2a;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff4a4a;
box-shadow:0 0 10px red;
}

/* FLEX */

.flex{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.flex>div{
flex:1;
min-width:280px;
}

/* MISSIONS */

.missions-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.mission-card{
background:#111;
border:1px solid #ff2a2a44;
padding:18px;
border-radius:10px;
cursor:pointer;
}

.mission-card:hover{
transform:scale(1.03);
box-shadow:0 0 15px red;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
}

.modal.show{
visibility:visible;
}

.modal-content{
background:#111;
border:1px solid #ff2a2a55;
padding:30px;
border-radius:12px;
width:420px;
}

.hidden{display:none}

</style>
</head>

<body>

<header>
<h1>MISSION BOARD</h1>
<p>Competitive bounty challenges</p>
</header>

<div class="live-bar">
🔥 ACTIVE PLAYERS: <span id="liveCount">0</span>
</div>

<div class="container">

<!-- AUTH -->

<div id="auth" class="panel">

<h2>Login / Register</h2>

<input id="username" placeholder="Username">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<label>
<input type="checkbox" onclick="togglePassword()"> Show Password
</label>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<label><input type="checkbox" id="ageConfirm"> I confirm I am 18+</label>
<label><input type="checkbox" id="termsConfirm"> I agree to Terms</label>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

<div class="flex">

<div class="panel">

<h2>Post Mission</h2>

<input id="target" placeholder="Target Player">

<select id="mode">
<option>REC</option>
<option>Theater</option>
<option>Proving Grounds</option>
<option>Park</option>
</select>

<input id="amount" type="number" placeholder="Bounty Amount ($7 minimum)">

<p>Mission expires automatically after 20 days.</p>

<div id="paypal-button-container"></div>

</div>

<div class="panel">

<h2>Leaderboards</h2>

<h3>🏆 Top Hunters</h3>
<ul id="hunterBoard"></ul>

<h3>🎯 Most Wanted</h3>
<ul id="wantedBoard"></ul>

</div>

</div>

<div class="panel">

<h2>Active Hunts</h2>

<div id="missions" class="missions-grid"></div>

</div>

</div>

</div>

<!-- MODAL -->

<div id="missionModal" class="modal">

<div class="modal-content">

<h2 id="modalTarget"></h2>

<p><strong>Mode:</strong> <span id="modalMode"></span></p>
<p><strong>Bounty:</strong> $<span id="modalBounty"></span></p>
<p><strong>Expires:</strong> <span id="modalDays"></span> days</p>

<input type="file" id="proofFile" accept="video/*,image/*">

<input id="paypalEmail" placeholder="PayPal Email">

<button onclick="submitClaim()">Submit Proof</button>

<br><br>

<input id="addAmount" type="number" placeholder="Add to bounty">

<button onclick="addBounty()">Add to Bounty</button>

<br><br>

<button onclick="closeModal()">Close</button>

</div>

</div>

<script>

const BASE="https://bounty-landing-backend.onrender.com"

let selectedMission=null
let currentUser=null

/* PASSWORD TOGGLE */

function togglePassword(){

let p=document.getElementById("password")

p.type = p.type==="password" ? "text":"password"

}

/* REGISTER */

async function register(){

if(!ageConfirm.checked||!termsConfirm.checked){
alert("You must confirm 18+ and accept terms")
return
}

let res=await fetch(BASE+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value,
agreedTerms:true,
isAdult:true
})
})

let data=await res.json()

alert(data.message||data.error)

}

/* LOGIN */

async function login(){

let res=await fetch(BASE+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value
})
})

let data=await res.json()

if(data.token){

currentUser=username.value

auth.classList.add("hidden")
dashboard.classList.remove("hidden")

loadMissions()
loadLeaderboards()
loadLive()

}

}

/* MISSIONS */

async function loadMissions(){

let res=await fetch(BASE+"/missions")
let data=await res.json()

missions.innerHTML=""

data.forEach(m=>{

let card=document.createElement("div")

card.className="mission-card"

card.innerHTML=`
<h3>${m.target}</h3>
<p>💰 $${m.bounty_amount}</p>
<p>⏳ ${m.days_remaining} days left</p>
`

card.onclick=()=>openMission(m)

missions.appendChild(card)

})

}

/* MODAL */

function openMission(m){

selectedMission=m

modalTarget.innerText=m.target
modalMode.innerText=m.reason
modalBounty.innerText=m.bounty_amount
modalDays.innerText=m.days_remaining

missionModal.classList.add("show")

}

function closeModal(){

missionModal.classList.remove("show")

}

/* CLAIM */

async function submitClaim(){

if(!proofFile.files[0]){
alert("Upload proof")
return
}

let form=new FormData()

form.append("missionId",selectedMission.id)
form.append("paypal",paypalEmail.value)
form.append("hunter",currentUser)
form.append("file",proofFile.files[0])

let res=await fetch(BASE+"/claims",{
method:"POST",
body:form
})

let data=await res.json()

alert(data.message||data.error)

}

/* BOUNTY ADD */

async function addBounty(){

await fetch(BASE+"/add-bounty",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

missionId:selectedMission.id,
amount:addAmount.value,
username:currentUser

})

})

alert("Bounty increased")

loadMissions()

}

/* LIVE COUNT */

async function loadLive(){

let res=await fetch(BASE+"/live-count")

let data=await res.json()

liveCount.innerText=data.players

}

setInterval(loadLive,5000)

/* PAYPAL */

paypal.Buttons({

createOrder:async()=>{

if(amount.value<7){
alert("Minimum bounty is $7")
return
}

let res=await fetch(BASE+"/create-order",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

target:target.value,
reason:mode.value,
amount:amount.value

})

})

let order=await res.json()

return order.id

},

onApprove:async(data)=>{

await fetch(BASE+"/capture-order",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

orderId:data.orderID,
target:target.value,
reason:mode.value,
amount:amount.value

})

})

alert("Mission created")

loadMissions()

}

}).render("#paypal-button-container")

</script>

</body>
</html>
