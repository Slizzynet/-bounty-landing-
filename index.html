<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSION BOARD</title>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: radial-gradient(circle at top right, #1a0000, #000);
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* HERO SECTION */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 60px 10%;
}

.hero-text h1 {
  font-size: 70px;
  color: #ff3c3c;
  letter-spacing: 4px;
  margin: 0;
  text-shadow: 0 0 20px red;
}

.hero-text p {
  margin-top: 20px;
  font-size: 20px;
  max-width: 600px;
  opacity: 0.8;
}

.countdown {
  margin-top: 25px;
  font-size: 28px;
  background: #111;
  padding: 12px 20px;
  display: inline-block;
  border-radius: 8px;
  border: 1px solid #ff2a2a;
}

/* 3D BASKETBALL */
.hero-ball img {
  width: 400px;
  filter: drop-shadow(0 0 40px red);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(8deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

/* PANELS */
.section {
  padding: 40px 10%;
}

.panel {
  background: linear-gradient(145deg, #140000, #000);
  border: 1px solid #ff2a2a;
  border-radius: 10px;
  padding: 25px;
  margin-bottom: 30px;
  box-shadow: 0 0 20px rgba(255,0,0,0.2);
}

.panel h2 {
  margin-top: 0;
  color: #ff4c4c;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: #000;
  border: 1px solid #ff2a2a;
  color: white;
  border-radius: 5px;
}

button {
  padding: 12px 20px;
  border: none;
  background: #ff2a2a;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.3s;
}

button:hover {
  background: #ff5555;
  box-shadow: 0 0 15px red;
}

.flex {
  display: flex;
  gap: 30px;
}

.flex > div {
  flex: 1;
}

.mission {
  padding: 10px;
  border-bottom: 1px solid #ff2a2a55;
}

.hidden {
  display: none;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>MISSION BOARD</h1>
    <p>Competitive missions that allow gaming communities to hold disruptive players accountable through verified gameplay challenges.</p>
    <div class="countdown" id="countdown"></div>
  </div>

  <div class="hero-ball">
    <!-- Replace with your basketball image if desired -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Basketball.png">
  </div>
</div>

<div class="section">

<!-- AUTH -->
<div class="panel" id="auth">
  <h2>Login or Register</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="flex">

<div class="panel">
  <h2>Report Player & Add Bounty</h2>
  <input id="target" placeholder="Player Tag">
  <textarea id="reason" placeholder="Reason"></textarea>
  <input id="amount" type="number" placeholder="Amount">
  <div id="paypal-button-container"></div>
</div>

<div class="panel">
  <h2>Claim Bounty</h2>
  <input id="missionId" placeholder="Mission ID">
  <input id="clip" placeholder="Clip Link">
  <input id="paypalEmail" placeholder="Your PayPal Email">
  <button onclick="submitClaim()">Submit Claim</button>
</div>

</div>

<div class="panel">
  <h2>Active Missions</h2>
  <div id="missions"></div>
</div>

</div>
</div>

<script>

const BASE_URL = "https://bounty-landing-backend.onrender.com";

// COUNTDOWN
let end = new Date();
end.setDate(end.getDate() + 7);
setInterval(() => {
  let now = new Date();
  let diff = end - now;
  let d = Math.floor(diff / (1000*60*60*24));
  let h = Math.floor(diff / (1000*60*60)) % 24;
  let m = Math.floor(diff / (1000*60)) % 60;
  let s = Math.floor(diff / 1000) % 60;
  countdown.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}, 1000);

// REGISTER
async function register() {
  await fetch(BASE_URL + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });
  alert("Registered!");
}

// LOGIN
async function login() {
  let res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });
  let data = await res.json();
  if (data.token) {
    localStorage.setItem("token", data.token);
    auth.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadMissions();
  } else {
    alert("Login failed");
  }
}

// LOAD MISSIONS
async function loadMissions() {
  let res = await fetch(BASE_URL + "/missions");
  let data = await res.json();
  missions.innerHTML = "";
  data.forEach(m => {
    missions.innerHTML += `
      <div class="mission">
        <strong>ID:</strong> ${m.id} |
        <strong>Player:</strong> ${m.target} |
        <strong>Reward:</strong> $${m.amount}
      </div>
    `;
  });
}

// CLAIM
async function submitClaim() {
  let token = localStorage.getItem("token");
  if (!token) return alert("Login required");

  await fetch(BASE_URL + "/claims", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({
      missionId: missionId.value,
      clip: clip.value,
      paypal: paypalEmail.value
    })
  });

  alert("Claim submitted");
}

// PAYPAL
paypal.Buttons({
  createOrder: (data, actions) => {
    return actions.order.create({
      purchase_units: [{
        amount: { value: amount.value }
      }]
    });
  },
  onApprove: async (data, actions) => {
    await actions.order.capture();
    let token = localStorage.getItem("token");

    await fetch(BASE_URL + "/missions", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body:JSON.stringify({
        target:target.value,
        reason:reason.value,
        amount:amount.value
      })
    });

    alert("Mission created!");
    loadMissions();
  }
}).render("#paypal-button-container");

</script>

</body>
</html>
